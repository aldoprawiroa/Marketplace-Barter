<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berhasil - SwapSpace</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .container { display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 50px; }
        .box { width: 250px; background-color: white; border: 2px solid #6b7280; border-radius: 10px; padding: 15px; text-align: center; }
        .box img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        .box h3 { margin-top: 12px; margin-bottom: 8px; }
        .box p { color: #6b7280; font-size: 14px; }
        .btn-tukar { margin-top:30px; padding:12px 24px; border:none; border-radius:8px; background:#2563eb; color:white; cursor:pointer; font-size:16px; }
        .modal { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; }
        .hidden { display:none; }
        .modal-content { background:white; padding:25px; border-radius:12px; width:400px; }
        .modal-actions { margin-top:20px; display:flex; justify-content:flex-end; gap:10px; }
        .modal-actions button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-batal { background: #e5e7eb; color: black; }
        .btn-lanjut { background: #2563eb; color: white; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SwapSpace</div>
        <nav>
            <a href="index.html">Beranda</a>
            <a href="riwayat.html">Riwayat</a>
            <a href="profil.html">Profil</a>
        </nav>
    </header>

    <div class="container" id="konfirm-container"></div>
    
    <div style="text-align: center;">
        <button id="btn-tukar-utama" class="btn-tukar hidden" onclick="openCheckout()">Lihat Rincian Swap</button>
    </div>

    <div id="modal-checkout" class="modal hidden">
        <div class="modal-content">
            <h2>Rincian Swap</h2>
            <div id="checkout-info"></div>
            <div class="modal-actions">
                <button class="btn-batal" onclick="closeCheckout()">Batal</button>
                <button class="btn-lanjut" onclick="processSwap()">Ajukan Swap</button>
            </div>
        </div>
    </div>
    <script src="js/payment.js"></script>

    <script src="js/checkout.js"></script>
    

</body>
</html>
