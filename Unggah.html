<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Unggah</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: white;
            width: 400px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .form-group{
            margin-bottom: 18px;
        }

        label{
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input[type="text"],
        input[type="file"],
        textarea{
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        textarea{
            resize: none;
            height: 80px;
        }

        button{
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #0056b3;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Form Unggah File</h2>

        <form>
            
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" placeholder="Masukkan nama lengkap">
            </div>

            <div class="form-group">
                <label>Judul File</label>
                <input type="text" placeholder="Masukkan judul file">
            </div>

            <div class="form-group">
                <label>Deskripsi</label>
                <textarea placeholder="Masukkan deskripsi file"></textarea>
            </div>

            <div class="form-group">
                <label>Pilih File</label>
                <input type="file">
            </div>

            <button type="submit">Unggah File</button>

        </form>
    </div>

</body>
</html>
