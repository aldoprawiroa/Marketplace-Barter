<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Barang - SwapPoint</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container{
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
            color: #1a73e8;
            font-size: 24px;
        }

        .form-group{
            margin-bottom: 15px;
        }

        label{
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #444;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"],
        select,
        textarea{
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus{
            border-color: #1a73e8;
        }

        .swappoint-input {
            position: relative;
        }

        /* Menambahkan ikon koin fiktif untuk SwapPoint */
        .swappoint-input input {
            padding-left: 40px;
        }

        .swappoint-input::before {
            content: '🪙';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        textarea{
            resize: none;
            height: 70px;
        }

        button{
            width: 100%;
            padding: 14px;
            background: #1a73e8;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-top: 10px;
        }

        button:hover{
            background: #1557b0;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>📦 Upload Barang</h2>

        <form action="#" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label>Nama Barang</label>
                <input type="text" name="nama_barang" placeholder="Contoh: Kamera Mirrorless" required>
            </div>

            <div class="form-group">
                <label>Kategori</label>
                <select name="kategori" required>
                    <option value="" disabled selected>Pilih Kategori</option>
                    <option value="elektronik">Elektronik</option>
                    <option value="fashion">Fashion</option>
                    <option value="hobi">Hobi & Koleksi</option>
                    <option value="lainnya">Lain-lain</option>
                </select>
            </div>

            <div class="form-group">
                <label>Deskripsi Kondisi</label>
                <textarea name="deskripsi" placeholder="Jelaskan detail kondisi barang..."></textarea>
            </div>

            <div class="form-group">
                <label>Estimasi Nilai (SwapPoint)</label>
                <div class="swappoint-input">
                    <input type="number" name="estimasi_nilai" placeholder="Contoh: 500" min="1" required>
                </div>
            </div>

            <div class="form-group">
                <label>Foto Barang</label>
                <input type="file" name="foto_barang" accept="image/*" required>
            </div>

            <button type="submit">Unggah ke SwapPoint</button>

        </form>
    </div>

</body>
</html>
